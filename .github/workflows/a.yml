name: Maven Selenium Tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Show Chrome version
        run: |
          google-chrome --version || true
          which google-chrome || true

      - name: Verify testng.xml presence
        run: |
          ls -la
          [ -f testng.xml ] && echo "Found testng.xml" || (echo "testng.xml NOT FOUND" && exit 1)
          echo "---- testng.xml ----"
          cat -n testng.xml

      - name: Validate dependency resolution
        run: mvn -B -U -DskipTests dependency:resolve

      - name: Build & run TestNG suite (headless)
        env:
          HEADLESS: "true"
        run: mvn -B -V test

      - name: Print surefire reports (debug)
        if: always()
        run: |
          echo "===== Surefire Reports ====="
          find . -path "**/target/surefire-reports" -type d -print
          for f in $(find . -path "**/target/surefire-reports/*.txt" -or -path "**/target/surefire-reports/*.xml"); do
            echo "----- $f -----"
            sed -n '1,200p' "$f" || true
          done

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/**
            **/target/*.log
