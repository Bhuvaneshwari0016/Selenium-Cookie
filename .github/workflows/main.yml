name: Maven Selenium Tests

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Show Chrome version
        run: |
          google-chrome --version || true
          which google-chrome || true

      # If you have a private dependency (like com.mock.com:MockServerTest),
      # add steps here to configure your repository credentials or publish the dependency,
      # or remove that dependency from pom.xml for CI.

      - name: Build & run TestNG suite with Xvfb (for non-headless tests)
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          mvn -B -V -DskipTests=false test

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/**
            **/target/*.log
